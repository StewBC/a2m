from: markdown
to: pdf
pdf-engine: xelatex

include-before-body: titlepage.tex
include-in-header: header.tex

toc: false
number-sections: true

variables:
  geometry: "margin=1in"
  mainfont: "texgyrepagella"
  mainfontoptions:
    - Path=/usr/local/texlive/2026basic/texmf-dist/fonts/opentype/public/tex-gyre/
    - Extension=.otf
    - UprightFont=*-regular
    - BoldFont=*-bold
    - ItalicFont=*-italic
    - BoldItalicFont=*-bolditalic
  monofont: "lmmono10-regular"
  monofontoptions:
    - Path=/usr/local/texlive/2026basic/texmf-dist/fonts/opentype/public/lm/
    - Extension=.otf
    - UprightFont=*

metadata:
  lang: en-US
